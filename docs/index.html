    <button class="lang-btn active" onclick="setLang('es')">🇪🇸</button>

    <button class="lang-btn" onclick="setLang('fr')">🇫🇷</button>
    <button class="lang-btn" onclick="setLang('it')">🇮🇹</button>

    <button class="lang-btn" onclick="setLang('hu')">🇭🇺</button>
    <button class="lang-btn" onclick="setLang('de')">🇩🇪</button>

  <div id="root"></div>

  <script>
    function setLang(lang) {
      // Marcar botón activo
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');

      // Usar cookie de Google Translate
      var expires = new Date();
      expires.setFullYear(expires.getFullYear() + 1);
      if (lang === 'es') {
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + location.hostname;
      } else {
        document.cookie = 'googtrans=/es/' + lang + '; expires=' + expires.toUTCString() + '; path=/';
        document.cookie = 'googtrans=/es/' + lang + '; expires=' + expires.toUTCString() + '; path=/; domain=.' + location.hostname;
      }
      location.reload();
    }

    // Marcar el botón activo según cookie actual
    (function() {
      var match = document.cookie.match(/googtrans=\/es\/([a-z]+)/);
      var activeLang = match ? match[1] : 'es';
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.remove('active');
        if (b.getAttribute('onclick').includes("'" + activeLang + "'")) b.classList.add('active');
      });
    })();
  </script>
