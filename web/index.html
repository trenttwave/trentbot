<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrentBot — Productes Hacoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <header class="bg-gray-900 border-b border-gray-800 px-6 py-5 flex items-center gap-3">
    <span class="text-3xl">💎</span>
    <div>
      <h1 class="text-xl font-bold tracking-tight">TrentBot</h1>
      <p class="text-gray-400 text-xs mt-0.5">Productes d'afiliats Hacoo</p>
    </div>
    <span id="badge" class="ml-auto hidden bg-blue-900 text-blue-300 text-xs font-medium px-2.5 py-1 rounded-full"></span>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="loading" class="text-center py-24 text-gray-500">Carregant productes…</div>
    <div id="empty" class="hidden text-center py-24 text-gray-500">Encara no hi ha productes.</div>
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, query, orderBy, onSnapshot }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "%%FIREBASE_API_KEY%%",
      projectId: "%%FIREBASE_PROJECT_ID%%",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grid    = document.getElementById('products');
    const loading = document.getElementById('loading');
    const empty   = document.getElementById('empty');
    const badge   = document.getElementById('badge');

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(ts) {
      if (!ts?.toDate) return '';
      return ts.toDate().toLocaleDateString('ca-ES', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    const q = query(collection(db, 'products'), orderBy('data', 'desc'));

    onSnapshot(q, (snapshot) => {
      loading.classList.add('hidden');

      if (snapshot.empty) {
        empty.classList.remove('hidden');
        badge.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');
      badge.textContent = `${snapshot.size} producte${snapshot.size !== 1 ? 's' : ''}`;
      badge.classList.remove('hidden');

      grid.innerHTML = '';
      snapshot.forEach((doc) => {
        const p = doc.data();
        const card = document.createElement('article');
        card.className = 'bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 hover:border-gray-600 transition-colors flex flex-col';
        card.innerHTML = `
          <div class="aspect-square bg-gray-800 overflow-hidden flex-shrink-0">
            ${p.imatge
              ? `<img src="${esc(p.imatge)}" alt="${esc(p.nom)}" loading="lazy"
                      class="w-full h-full object-cover"
                      onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'flex items-center justify-center h-full text-5xl',textContent:'📦'}))">`
              : '<div class="flex items-center justify-center h-full text-5xl">📦</div>'
            }
          </div>
          <div class="p-4 flex flex-col gap-2 flex-1">
            ${p.marca ? `<span class="self-start bg-blue-900/60 text-blue-300 text-xs font-semibold px-2 py-0.5 rounded">${esc(p.marca)}</span>` : ''}
            <h2 class="font-semibold text-sm leading-snug line-clamp-2 flex-1">${esc(p.nom) || 'Sense títol'}</h2>
            <div class="flex items-center gap-3 text-sm mt-1">
              <span class="text-yellow-400 font-bold">${esc(p.preu)} 💎</span>
              ${p.colors ? `<span class="text-gray-400">${esc(p.colors)} 🎨</span>` : ''}
            </div>
            ${p.data ? `<p class="text-xs text-gray-600">${formatDate(p.data)}</p>` : ''}
            <a href="${esc(p.link_afiliats)}" target="_blank" rel="noopener noreferrer"
               class="mt-2 block w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-semibold text-center py-2.5 rounded-xl transition-colors">
              Veure producte →
            </a>
          </div>`;
        grid.appendChild(card);
      });
    }, (err) => {
      loading.innerHTML = `<p class="text-red-400">Error: ${esc(err.message)}</p>`;
    });
  </script>
</body>
</html>
